kind = "web"
previewPath = "/"
title = "EcoSort - Gioco del Riciclo"
version = "1.0.0"
id = "artifacts/ecosort"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23008

[services.development]
run = "pnpm --filter @workspace/ecosort run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecosort", "run", "build" ]
publicDir = "artifacts/ecosort/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23008"
BASE_PATH = "/"
