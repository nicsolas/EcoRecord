<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <!-- Primary Meta Tags -->
    <title>E-kosmos</title>
    <meta name="title" content="E-kosmos" />
    <meta name="description" content="E-kosmos: Impara a differenziare i rifiuti in modo divertente. Usa il nostro scanner AI per riconoscere gli oggetti e scala la classifica del riciclo!" />

    <link rel="canonical" href="https://e-kosmos.vercel.app/" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "E-kosmos",
      "url": "https://e-kosmos.vercel.app/",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "All",
      "description": "Impara a differenziare i rifiuti con l'intelligenza artificiale e un gioco interattivo.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      }
    }
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://e-kosmos.vercel.app/" />
    <meta property="og:title" content="E-kosmos" />
    <meta property="og:description" content="E-kosmos: Impara a differenziare i rifiuti con l'AI e scala la classifica del riciclo!" />

    <meta property="twitter:description" content="E-kosmos: Impara a differenziare i rifiuti con l'AI e scala la classifica del riciclo!" />
    <meta property="twitter:image" content="https://e-kosmos.vercel.app/opengraph.jpg" />

    <link rel="icon" type="image/png" href="/images/logo-e-kosmos.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>

    <div id="root"></div>
