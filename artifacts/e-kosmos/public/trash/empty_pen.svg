<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Shadow -->
  <ellipse cx="100" cy="185" rx="40" ry="6" fill="#00000018"/>
  <!-- Pen body - long barrel -->
  <rect x="72" y="30" width="22" height="120" rx="4" fill="#3B82F6"/>
  <!-- Pen top cap area -->
  <rect x="72" y="28" width="22" height="16" rx="4" fill="#1D4ED8"/>
  <!-- Clip -->
  <rect x="90" y="26" width="5" height="60" rx="2.5" fill="#1E3A8A"/>
  <circle cx="92.5" cy="88" r="5" fill="#1E3A8A"/>
  <!-- Grip section -->
  <rect x="72" y="140" width="22" height="18" rx="2" fill="#93C5FD"/>
  <!-- Grip lines -->
  <line x1="76" y1="144" x2="76" y2="154" stroke="#60A5FA" stroke-width="1.5"/>
  <line x1="80" y1="144" x2="80" y2="154" stroke="#60A5FA" stroke-width="1.5"/>
  <line x1="84" y1="144" x2="84" y2="154" stroke="#60A5FA" stroke-width="1.5"/>
  <line x1="88" y1="144" x2="88" y2="154" stroke="#60A5FA" stroke-width="1.5"/>
  <!-- Tip taper -->
  <polygon points="72,158 94,158 88,175" fill="#E5E7EB"/>
  <!-- Tip point -->
  <polygon points="84,174 88,175 86,180" fill="#6B7280"/>
  <!-- No ink indicator -->
  <ellipse cx="83" cy="70" rx="6" ry="3" fill="#BFDBFE" opacity="0.5"/>
  <line x1="77" y1="68" x2="89" y2="72" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Label text area -->
  <rect x="75" y="50" width="16" height="40" rx="2" fill="#DBEAFE" opacity="0.6"/>
</svg>
