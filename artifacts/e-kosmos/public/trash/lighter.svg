<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Shadow -->
  <ellipse cx="100" cy="185" rx="35" ry="6" fill="#00000018"/>
  <!-- Lighter body -->
  <rect x="68" y="70" width="64" height="105" rx="12" fill="#EF4444"/>
  <!-- Body shine -->
  <rect x="74" y="75" width="12" height="90" rx="6" fill="white" opacity="0.25"/>
  <!-- Bottom rounded -->
  <rect x="68" y="158" width="64" height="17" rx="12" fill="#DC2626"/>
  <!-- Top metal section -->
  <rect x="72" y="52" width="56" height="22" rx="6" fill="#9CA3AF"/>
  <rect x="74" y="54" width="52" height="18" rx="5" fill="#D1D5DB"/>
  <!-- Flint wheel -->
  <ellipse cx="116" cy="58" rx="10" ry="5" fill="#6B7280"/>
  <ellipse cx="116" cy="56" rx="10" ry="5" fill="#9CA3AF"/>
  <!-- Wheel grooves -->
  <line x1="108" y1="52" x2="108" y2="60" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="112" y1="51" x2="112" y2="61" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="116" y1="51" x2="116" y2="61" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="120" y1="51" x2="120" y2="61" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="124" y1="52" x2="124" y2="60" stroke="#6B7280" stroke-width="1.5"/>
  <!-- Nozzle/burner -->
  <rect x="84" y="44" width="14" height="12" rx="2" fill="#6B7280"/>
  <rect x="87" y="40" width="8" height="8" rx="2" fill="#4B5563"/>
  <!-- Empty gas indicator (clear window) -->
  <rect x="80" y="100" width="40" height="50" rx="4" fill="#FECACA" opacity="0.5"/>
  <rect x="80" y="100" width="40" height="50" rx="4" fill="none" stroke="#FCA5A5" stroke-width="1.5"/>
  <!-- Empty text indicator line -->
  <line x1="85" y1="145" x2="115" y2="110" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
</svg>
