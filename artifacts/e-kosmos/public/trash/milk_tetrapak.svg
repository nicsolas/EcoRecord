<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Shadow -->
  <ellipse cx="100" cy="186" rx="42" ry="7" fill="#00000020"/>
  <!-- Main carton body -->
  <rect x="62" y="60" width="76" height="120" rx="4" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <!-- Top gable fold (left side) -->
  <polygon points="62,60 100,45 100,60" fill="#D1D5DB"/>
  <!-- Top gable fold (right side) -->
  <polygon points="138,60 100,45 100,60" fill="#E5E7EB"/>
  <!-- Top center ridge -->
  <line x1="100" y1="45" x2="100" y2="60" stroke="#9CA3AF" stroke-width="1.5"/>
  <!-- Blue stripe top band -->
  <rect x="62" y="60" width="76" height="18" rx="0" fill="#2563EB"/>
  <rect x="62" y="60" width="76" height="4" rx="0" fill="#1D4ED8"/>
  <!-- Blue stripe bottom band -->
  <rect x="62" y="162" width="76" height="18" rx="4" fill="#2563EB"/>
  <!-- LATTE label -->
  <text x="100" y="73" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">LATTE</text>
  <!-- Cow illustration (simple) -->
  <ellipse cx="100" cy="115" rx="24" ry="18" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <!-- Cow spots -->
  <ellipse cx="96" cy="110" rx="7" ry="5" fill="#1F2937" opacity="0.8"/>
  <ellipse cx="110" cy="118" rx="6" ry="4" fill="#1F2937" opacity="0.8"/>
  <!-- Cow head -->
  <circle cx="88" cy="103" r="9" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <!-- Cow eyes -->
  <circle cx="85" cy="101" r="1.5" fill="#1F2937"/>
  <circle cx="91" cy="101" r="1.5" fill="#1F2937"/>
  <!-- Cow nose -->
  <ellipse cx="88" cy="106" rx="4" ry="2.5" fill="#FCA5A5"/>
  <circle cx="86.5" cy="106" r="1" fill="#9F1239"/>
  <circle cx="89.5" cy="106" r="1" fill="#9F1239"/>
  <!-- Cow horns -->
  <path d="M84,96 Q82,90 85,88" stroke="#D97706" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M92,96 Q93,90 90,88" stroke="#D97706" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Milk drop -->
  <path d="M115,105 Q118,100 121,105 Q121,111 118,112 Q115,111 115,105Z" fill="#BFDBFE"/>
  <!-- Milk wave line -->
  <path d="M68,145 Q80,140 100,145 Q120,150 132,145" stroke="#2563EB" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>
