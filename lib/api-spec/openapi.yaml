openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: EcoSort API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scores
    description: Score and leaderboard operations
  - name: game
    description: Game configuration
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /scores:
    get:
      operationId: getLeaderboard
      tags: [scores]
      summary: Get leaderboard
      description: Returns the top players sorted by score
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of top scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScoreWithUser"
    post:
      operationId: submitScore
      tags: [scores]
      summary: Submit a score
      description: Submit a new score (creates user/game if needed)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitScoreRequest"
      responses:
        "200":
          description: Score submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreWithUser"

  /scores/player:
    get:
      operationId: getPlayerScore
      tags: [scores]
      summary: Get player score by email
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Player best score found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreWithUser"
        "404":
          description: Player not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /game/config:
    get:
      operationId: getGameConfig
      tags: [game]
      summary: Get game configuration
      description: Returns game settings including countdown deadline
      responses:
        "200":
          description: Game configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameConfig"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ScoreWithUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        score:
          type: integer
        username:
          type: string
        email:
          type: string
        gameName:
          type: string
        rank:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - score
        - username
        - email
        - gameName
        - createdAt

    SubmitScoreRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        gameName:
          type: string
        score:
          type: integer
      required:
        - username
        - email
        - gameName
        - score

    GameConfig:
      type: object
      properties:
        countdownDeadline:
          type: string
          format: date-time
        timePerItem:
          type: integer
          description: Seconds per item
        pointsPerCorrectAnswer:
          type: integer
      required:
        - countdownDeadline
        - timePerItem
        - pointsPerCorrectAnswer

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

